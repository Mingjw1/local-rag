# 模型注册表
# 支持环境变量覆盖: ${VAR:-default}
models:
  embedding:
    default: ${EMBEDDING_MODEL:-nomic-embed-text}
    options:
      nomic-embed-text:
        provider: ollama
        model: nomic-embed-text
        dim: ${EMBEDDING_DIM:-768}
        max_tokens: 8192
        batch_size: 32
      mxbai-embed-large:
        provider: ollama
        model: mxbai-embed-large
        dim: 1024
        max_tokens: 512
        batch_size: 16
      bge-m3:
        provider: ollama
        model: bge-m3
        dim: 1024
        max_tokens: 8192
        batch_size: 16
      jina-embeddings-v3:
        provider: ollama
        model: jina-embeddings-v3
        dim: 1024
        max_tokens: 8192
        batch_size: 16

  generation:
    default: ${OLLAMA_GENERATION_MODEL:-qwen2.5:7b}
    options:
      qwen2.5:7b:
        provider: ollama
        model: qwen2.5:7b
        context_window: 32768
        temperature: ${LLM_TEMPERATURE:-0.3}
        top_p: 0.9
        max_tokens: ${LLM_MAX_TOKENS:-2048}
      qwen2.5:14b:
        provider: ollama
        model: qwen2.5:14b
        context_window: 32768
        temperature: ${LLM_TEMPERATURE:-0.3}
        top_p: 0.9
        max_tokens: ${LLM_MAX_TOKENS:-2048}
      llama3.1:8b:
        provider: ollama
        model: llama3.1:8b
        context_window: 131072
        temperature: ${LLM_TEMPERATURE:-0.3}
        top_p: 0.9
        max_tokens: ${LLM_MAX_TOKENS:-2048}
      deepseek-r1:7b:
        provider: ollama
        model: deepseek-r1:7b
        context_window: 131072
        temperature: ${LLM_TEMPERATURE:-0.3}
        top_p: 0.9
        max_tokens: ${LLM_MAX_TOKENS:-2048}

  rerank:
    default: ${RERANK_MODEL:-}
    options: {}
