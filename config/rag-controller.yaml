# RAG Controller 主配置
server:
  host: "0.0.0.0"
  port: 8000
  log_level: ${RAG_LOG_LEVEL:-info}
  cors_origins: ${RAG_CORS_ORIGINS:-*}

database:
  url: ${DATABASE_URL}
  echo: false
  pool_size: 10
  max_overflow: 20

vector_db:
  provider: qdrant
  host: ${QDRANT_HOST:-qdrant}
  port: ${QDRANT_PORT:-6333}
  grpc_port: 6334
  prefer_grpc: false
  api_key: ${QDRANT_API_KEY:-}
  collection_name: "documents"

cache:
  provider: redis
  host: ${REDIS_HOST:-redis}
  port: ${REDIS_PORT:-6379}
  password: ${REDIS_PASSWORD:-}
  embedding_ttl: 86400
  query_ttl: 300

storage:
  provider: minio
  endpoint: ${MINIO_ENDPOINT:-minio:9000}
  access_key: ${MINIO_ACCESS_KEY:-minioadmin}
  secret_key: ${MINIO_SECRET_KEY:-minio_secret}
  bucket: ${MINIO_BUCKET:-ragkb-docs}
  secure: false

wiki:
  enabled: true
  base_path: ./data/wiki  # Wiki markdown 存储路径
  index_file: index.md
  log_file: log.md
  page_template: templates/page.md.j2
