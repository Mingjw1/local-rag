# AMD GPU 覆盖配置
# 使用方式（GID 自动检测，无需手动填写）：
#   bash scripts/up-amd.sh
# 或者手动：
#   VIDEO_GID=$(getent group video | cut -d: -f3)
#   RENDER_GID=$(getent group render | cut -d: -f3)
#   docker compose -f docker-compose.yml -f docker-compose.amd.yml up -d

services:
  ollama:
    image: ollama/ollama:latest
    devices:
      - /dev/kfd:/dev/kfd
      - /dev/dri:/dev/dri
    group_add:
      - "${VIDEO_GID:?请设置 VIDEO_GID 环境变量，或使用 scripts/up-amd.sh 启动}"
      - "${RENDER_GID:?请设置 RENDER_GID 环境变量，或使用 scripts/up-amd.sh 启动}"
